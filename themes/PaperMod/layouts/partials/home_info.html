    <header class="entry-header">
        <h1>{{ .Title | markdownify }}</h1>

    <div class="entry-content">
        {{ .Content | markdownify }}

    <!-- WDU: add the installation button -->

        </a>

    <div>
        <p style="margin-top: 30px; margin-bottom: 10px; font-weight: normal; font-family: 'Roboto Mono', monospace;">
            <a>PyPOTS users are from (so far we know): </a>
<!--            <a>Trusted by users of both academia and industria - from top research institutes to FORTUNE 500: </a>-->

        <div style="">

                <img alt="UCLA" src="/figs/user_logos/UCLA.svg" >

            <div class="user_logo">

            </div>
            <div class="user_logo">
                <img alt="ETH" src="/figs/user_logos/ETH.svg" >

        </div>

    <div>

        <img id="img-we-are-pypots" alt="We are PyPOTS" src="/figs/PyPOTS_LinkedIn_BG_image.jpg" style="width: 720px;margin-top: 20px;">
