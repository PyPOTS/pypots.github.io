{{- with site.Params.homeInfoParams }}
<article class="first-entry home-info">
    <header class="entry-header">
        <h1>{{ .Title | markdownify }}</h1>
    </header>
    <div class="entry-content">
        {{ .Content | markdownify }}
    </div>

    <!-- WDU: add the installation button -->
    <div align="center" class="install">
          <a class="change" id="install-button" href="https://github.com/WenjieDu/PyPOTS#-installation" target="_blank">
              Install PyPOTS right now&nbsp;&nbsp;»
          </a>
    </div>

    <footer class="entry-footer">
        {{ partial "social_icons.html" site.Params.socialIcons }}
    </footer>
</article>
{{- end -}}
